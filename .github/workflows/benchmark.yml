name: Video DataLoader Benchmark

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger

jobs:
  benchmark:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies (FFmpeg & C-Headers)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            pkg-config \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            libavdevice-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Build Rust Extension
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin torch torchvision numpy av huggingface_hub
          maturin develop --release
          
      - name: Run Benchmark
        run: |
          source .venv/bin/activate
          cd benchmarks
          python benchmark.py
